<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME VOCAB</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2433;
    --accent: #00e5ff;
    --accent2: #ff6b6b;
    --accent3: #b8ff6b;
    --text: #e8eaf0;
    --muted: #5a6070;
    --border: #2a3040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,229,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(255,107,107,0.04) 0%, transparent 50%);
    pointer-events: none;
  }
  .app { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 20px; }
  .header { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--accent); letter-spacing: 4px; }
  .counter { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 2px; }
  .progress-bar { width: 100%; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    position: relative;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    gap: 16px;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
    border-radius: 16px 16px 0 0;
  }
  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 4px 12px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .english {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(28px, 6vw, 48px);
    color: var(--text);
    letter-spacing: 2px;
    line-height: 1.2;
  }
  .japanese {
    font-size: clamp(16px, 3vw, 22px);
    color: var(--muted);
    line-height: 1.6;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .japanese.hidden { opacity: 0; transform: translateY(8px); }
  .japanese.visible { opacity: 1; transform: translateY(0); color: var(--accent3); }
  .speaking-indicator { display: flex; gap: 4px; align-items: flex-end; height: 20px; }
  .bar { width: 3px; background: var(--accent); border-radius: 2px; animation: none; height: 4px; }
  .speaking .bar:nth-child(1) { animation: wave 0.8s ease-in-out infinite 0s; }
  .speaking .bar:nth-child(2) { animation: wave 0.8s ease-in-out infinite 0.1s; }
  .speaking .bar:nth-child(3) { animation: wave 0.8s ease-in-out infinite 0.2s; }
  .speaking .bar:nth-child(4) { animation: wave 0.8s ease-in-out infinite 0.3s; }
  .speaking .bar:nth-child(5) { animation: wave 0.8s ease-in-out infinite 0.4s; }
  @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 18px; } }
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .control-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; min-width: 50px; }
  .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { border-color: var(--accent); background: rgba(0,229,255,0.1); color: var(--accent); }
  .btn-play { font-size: 13px; padding: 8px 24px; border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.08); }
  .btn-play:hover { background: rgba(0,229,255,0.18); }
  .btn-play.playing { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,107,0.08); }
  .speed-control { display: flex; align-items: center; gap: 10px; flex: 1; }
  input[type="range"] { flex: 1; accent-color: var(--accent); height: 4px; min-width: 80px; }
  .speed-val { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--accent); min-width: 32px; text-align: right; }
  .status { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; letter-spacing: 2px; min-height: 14px; }
  .shuffle-on { color: var(--accent3) !important; border-color: var(--accent3) !important; background: rgba(184,255,107,0.08) !important; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="logo">GAME VOCAB</div>
    <div class="counter" id="counter">-- / --</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="card">
    <div class="tag" id="word-tag">--</div>
    <div class="english" id="eng-text">LOADING...</div>
    <div class="japanese hidden" id="jpn-text"></div>
    <div class="speaking-indicator" id="indicator">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>
  <div class="controls">
    <div class="control-row">
      <button class="btn btn-play" id="play-btn" onclick="togglePlay()">&#9654; PLAY</button>
      <button class="btn" onclick="prevWord()">&#9664; PREV</button>
      <button class="btn" onclick="nextWord()">NEXT &#9654;</button>
      <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">&#8644; SHUFFLE</button>
    </div>
    <div class="control-row">
      <span class="label">LEVEL</span>
      <div class="btn-group" id="level-btns"></div>
    </div>
    <div class="control-row">
      <span class="label">TAG</span>
      <div class="btn-group" id="tag-btns"></div>
    </div>
    <div class="control-row">
      <span class="label">SPEED</span>
      <div class="speed-control">
        <span style="font-size:10px;color:var(--muted);font-family:monospace">遅</span>
        <input type="range" id="speed-range" min="2" max="10" step="0.5" value="4" oninput="setSpeed(this.value)">
        <span style="font-size:10px;color:var(--muted);font-family:monospace">速</span>
        <span class="speed-val" id="speed-val">4s</span>
      </div>
    </div>
  </div>
  <div class="status" id="status">READY</div>
</div>

let allWords = ALL_WORDS;
let filteredWords = [...allWords];
let currentIndex = 0;
let isPlaying = false;
let isShuffle = false;
let currentLevel = '全て';
let currentTag = '全て';
let phaseTimer = null;
let intervalSec = 4;
let synth = window.speechSynthesis;

function applyFilter() {
  filteredWords = allWords.filter(w => {
    const lvOk = currentLevel === '全て' || w.l === currentLevel;
    const tagOk = currentTag === '全て' || w.t === currentTag;
    return lvOk && tagOk;
  });
  if (isShuffle) shuffle(filteredWords);
  currentIndex = 0;
  updateCounter();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function updateCounter() {
  document.getElementById('counter').textContent = filteredWords.length > 0
    ? (currentIndex + 1) + ' / ' + filteredWords.length
    : '0 / 0';
  const pct = filteredWords.length > 0 ? ((currentIndex + 1) / filteredWords.length * 100) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function updateCard(word) {
  document.getElementById('eng-text').textContent = word.e;
  document.getElementById('jpn-text').textContent = word.j;
  document.getElementById('word-tag').textContent = word.t + ' / ' + word.l;
  document.getElementById('jpn-text').className = 'japanese hidden';
  document.getElementById('indicator').classList.remove('speaking');
  updateCounter();
}

function speak(text, lang, onEnd) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = 0.9;
  utt.onend = onEnd || null;
  utt.onerror = onEnd || null;
  synth.speak(utt);
}

function playPhases(word) {
  clearTimeout(phaseTimer);
  const indicator = document.getElementById('indicator');
  const jpn = document.getElementById('jpn-text');
  const status = document.getElementById('status');

  indicator.classList.add('speaking');
  if (status) status.textContent = 'EN...';

  speak(word.e, 'en-US', () => {
    indicator.classList.remove('speaking');
    phaseTimer = setTimeout(() => {
      if (!isPlaying) return;
      jpn.className = 'japanese visible';
      indicator.classList.add('speaking');
      if (status) status.textContent = 'JP...';
      speak(word.j, 'ja-JP', () => {
        indicator.classList.remove('speaking');
        if (status) status.textContent = 'NEXT...';
        phaseTimer = setTimeout(() => {
          if (!isPlaying) return;
          nextWord();
        }, intervalSec * 500);
      });
    }, intervalSec * 400);
  });
}

function nextWord() {
  if (filteredWords.length === 0) return;
  currentIndex = (currentIndex + 1) % filteredWords.length;
  updateCard(filteredWords[currentIndex]);
  if (isPlaying) playPhases(filteredWords[currentIndex]);
}

function prevWord() {
  synth.cancel();
  clearTimeout(phaseTimer);
  if (filteredWords.length === 0) return;
  currentIndex = (currentIndex - 1 + filteredWords.length) % filteredWords.length;
  updateCard(filteredWords[currentIndex]);
  if (isPlaying) playPhases(filteredWords[currentIndex]);
}

function startPlay() {
  if (filteredWords.length === 0) return;
  isPlaying = true;
  const btn = document.getElementById('play-btn');
  btn.innerHTML = '&#9646;&#9646; PAUSE';
  btn.classList.add('playing');
  updateCard(filteredWords[currentIndex]);
  playPhases(filteredWords[currentIndex]);
}

function stopPlay() {
  isPlaying = false;
  synth.cancel();
  clearTimeout(phaseTimer);
  const btn = document.getElementById('play-btn');
  btn.innerHTML = '&#9654; PLAY';
  btn.classList.remove('playing');
  document.getElementById('status').textContent = 'PAUSED';
  document.getElementById('indicator').classList.remove('speaking');
}

function togglePlay() {
  if (isPlaying) stopPlay(); else startPlay();
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuffle-btn').classList.toggle('shuffle-on', isShuffle);
  applyFilter();
  if (filteredWords[currentIndex]) updateCard(filteredWords[currentIndex]);
}

function setLevel(lv) {
  currentLevel = lv;
  const wasPlaying = isPlaying;
  stopPlay();
  applyFilter();
  document.querySelectorAll('#level-btns .btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === lv);
  });
  if (filteredWords[0]) updateCard(filteredWords[0]);
  if (wasPlaying) startPlay();
}

function setTag(tag) {
  currentTag = tag;
  const wasPlaying = isPlaying;
  stopPlay();
  applyFilter();
  document.querySelectorAll('#tag-btns .btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === tag);
  });
  if (filteredWords[0]) updateCard(filteredWords[0]);
  if (wasPlaying) startPlay();
}

function setSpeed(val) {
  intervalSec = parseFloat(val);
  document.getElementById('speed-val').textContent = val + 's';
}

function buildFilters() {
  const levels = ['全て', ...new Set(allWords.map(w => w.l).filter(Boolean))];
  const tags = ['全て', ...new Set(allWords.map(w => w.t).filter(Boolean))];

  const lvContainer = document.getElementById('level-btns');
  levels.forEach(lv => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (lv === currentLevel ? ' active' : '');
    btn.textContent = lv;
    btn.dataset.val = lv;
    btn.onclick = () => setLevel(lv);
    lvContainer.appendChild(btn);
  });

  const tagContainer = document.getElementById('tag-btns');
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (tag === currentTag ? ' active' : '');
    btn.textContent = tag;
    btn.dataset.val = tag;
    btn.onclick = () => setTag(tag);
    tagContainer.appendChild(btn);
  });
}

buildFilters();
applyFilter();
if (filteredWords[0]) updateCard(filteredWords[0]);
</script>
